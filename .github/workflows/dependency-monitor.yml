name: Dependency Monitor for cinetalk

on:
  schedule: 
    - cron: '0 2 * * 1' #KST 월요일 11:00
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: audit
        run: |
          AUDIT_RESULT=$(npm audit --json || true)
          
          ISSUES=$(echo "$AUDIT_RESULT" | jq -r '
            .vulnerabilities
            | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | "- 패키지: \(.key)\n- 심각도: \(.value.severity | ascii_upcase)\n"
          ')

          {
            echo "issues<<EOF"
            echo "$ISSUES"
            echo "EOF"
          } >> $GITHUB_OUTPUT
        
        # ========================================
        # 1. npm audit 결과를 JSON 형태로 저장한다
        # >> 취약점이 발견되어도 워크플로우가 중단되지 않도록 || true 사용
        # 2. vulnerabilities 객체에서 High / Critical 취약점만 추출
        # >> Discord 보고서에 넣을 문자열 형태로 가공하여 ISSUES 변수에 저장
        # 3. 다음 스텝(Discord Notify)에서
        # steps.audit.outputs.issues 형태로 읽을 수 있도록
        # issues 라는 이름의 GitHub Actions Output 등록
        # ========================================
      
      - name: Discord Notify - OK
        if: steps.audit.outputs.issues == ''
        env:
          DISCORD_WEBHOOK_SECURITY: ${{ secrets.DISCORD_WEBHOOK_SECURITY }}
        run: |
          CURRENT_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M (KST)')

          curl -H "Content-Type: application/json" \
            -d "{
              \"content\":\"✅ 오스틴의 보안 점검 리포트 [성공]\n\nCinetalk 프로젝트의 보안 점검을 완료했습니다.\n현재 보안 취약점이 없습니다.\n\n- 브랜치: ${{ github.ref_name }}\n- 시간: ${CURRENT_TIME}\n\n모든 의존성은 안전한 상태입니다.\"
            }" \
            $DISCORD_WEBHOOK_SECURITY

      - name: Discord Notify - WARN
        if: steps.audit.outputs.issues != '' && success()
        env:
          DISCORD_WEBHOOK_SECURITY: ${{ secrets.DISCORD_WEBHOOK_SECURITY }}
        run: |
          CURRENT_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M (KST)')

          curl -H "Content-Type: application/json" \
            -d "{
              \"content\":\"⚠️ 오스틴의 보안 점검 리포트 [경고]\n\nCinetalk 프로젝트에서 보안 취약점이 발견되었습니다.\n\n${{ steps.audit.outputs.issues }}\n- 브랜치: ${{ github.ref_name }}\n- 시간: ${CURRENT_TIME}\n\n보안 취약점에 대한 추가 조치가 필요합니다.\"
            }" \
            $DISCORD_WEBHOOK_SECURITY
      
      - name: Discord Notify - FAIL
        if: failure()
        env:
          DISCORD_WEBHOOK_SECURITY: ${{ secrets.DISCORD_WEBHOOK_SECURITY }}
        run: |
          CURRENT_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M (KST)')

          curl -H "Content-Type: application/json" \
            -d "{
              \"content\":\"❌ 오스틴의 보안 점검 리포트 [실패]\n\nCinetalk 프로젝트 점검 중 오류가 발생했습니다.\n\n- 브랜치: ${{ github.ref_name }}\n- 시간: ${CURRENT_TIME}\n\n점검이 정상적으로 완료되지 않았습니다.\n원인 확인이 필요합니다.\"
            }" \
            $DISCORD_WEBHOOK_SECURITY